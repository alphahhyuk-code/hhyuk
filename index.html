<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --safe-top:env(safe-area-inset-top,16px);
  --safe-bottom:env(safe-area-inset-bottom,16px);
  --red:#e07060;--blue:#6090c0;--green:#5a9e6f;
  --ink:#111;--sub:#999;--card:#f7f7f7;--border:#ebebeb;
}
body{background:#e4e4e4;font-family:'Inter','Noto Sans JP',-apple-system,sans-serif;min-height:100dvh;padding-bottom:var(--safe-bottom);}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:calc(var(--safe-top) + 44px);background:rgba(255,255,255,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid #e8e8e8;z-index:50;display:flex;align-items:flex-end;padding:0 16px 10px;transition:opacity 0.2s;}
.topbar.hidden{opacity:0;pointer-events:none;}
.topbar-menu-btn{background:none;border:none;cursor:pointer;font-size:1.3rem;line-height:1;padding:0;color:var(--ink);}
.topbar-title{font-size:1rem;font-weight:600;color:var(--ink);letter-spacing:-0.02em;flex:1;text-align:center;}
.topbar-right{width:28px;}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.sidebar-overlay.active{opacity:1;pointer-events:all;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:72vw;max-width:280px;background:#fff;z-index:201;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;padding-top:var(--safe-top);}
.sidebar.active{transform:translateX(0);}
.sidebar-head{padding:20px 20px 16px;border-bottom:1px solid #f2f2f2;}
.sidebar-app-name{font-size:1.2rem;font-weight:700;letter-spacing:-0.03em;color:var(--ink);}
.sidebar-trip-name{font-size:0.72rem;color:var(--sub);margin-top:3px;}
.sidebar-menu{flex:1;padding:12px 0;overflow-y:auto;}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;transition:background 0.12s;border:none;background:none;width:100%;font-family:inherit;text-align:left;}
.sidebar-item:active{background:#f5f5f5;}
.sidebar-item.active{background:#f0f0f0;}
.sidebar-item-icon{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0;}
.sidebar-item-label{font-size:0.88rem;font-weight:400;color:var(--ink);}
.sidebar-item.active .sidebar-item-label{font-weight:600;}
.sidebar-divider{height:1px;background:#f2f2f2;margin:6px 20px;}
.sidebar-footer{padding:16px 20px calc(var(--safe-bottom)+12px);border-top:1px solid #f2f2f2;}
.sidebar-footer-label{font-size:0.6rem;color:#ccc;letter-spacing:0.05em;}

.page{display:none;padding:calc(var(--safe-top) + 56px) 12px 16px;}
.page.active{display:block;}
.page#page-cal{padding:0;}

.cal-hero{
  padding:calc(var(--safe-top) + 52px) 20px 20px;
  position:relative;
  transition:background 0.5s ease;
}
.cal-hero.m1 {background:linear-gradient(135deg,#0d47a1,#1565c0);}
.cal-hero.m2 {background:linear-gradient(135deg,#6a1b9a,#7b1fa2);}
.cal-hero.m3 {background:linear-gradient(135deg,#ad1457,#c2185b);}
.cal-hero.m4 {background:linear-gradient(135deg,#c62828,#d32f2f);}
.cal-hero.m5 {background:linear-gradient(135deg,#2e7d32,#388e3c);}
.cal-hero.m6 {background:linear-gradient(135deg,#00838f,#0097a7);}
.cal-hero.m7 {background:linear-gradient(135deg,#0277bd,#0288d1);}
.cal-hero.m8 {background:linear-gradient(135deg,#01579b,#0277bd);}
.cal-hero.m9 {background:linear-gradient(135deg,#f57f17,#f9a825);}
.cal-hero.m10{background:linear-gradient(135deg,#bf360c,#d84315);}
.cal-hero.m11{background:linear-gradient(135deg,#4e342e,#5d4037);}
.cal-hero.m12{background:linear-gradient(135deg,#263238,#37474f);}

/* 9월은 텍스트 검정 */
.cal-hero.m9 .cal-hero-year,
.cal-hero.m9 .cal-hero-month,
.cal-hero.m9 .cal-hero-today-btn,
.cal-hero.m9 .cal-hero-menu-btn,
.cal-hero.m9 .cal-hero-nav-btn { color:#111; }
.cal-hero.m9 .cal-hero-nav-btn,
.cal-hero.m9 .cal-hero-today-btn,
.cal-hero.m9 .cal-hero-menu-btn { background:rgba(0,0,0,0.1); }

.cal-hero-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-hero-nav-btn{background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:#fff;line-height:1;}
.cal-hero-year{font-size:2.4rem;font-weight:700;color:#fff;letter-spacing:-0.03em;line-height:1;text-align:center;}
.cal-hero-month{font-size:0.85rem;font-weight:400;color:rgba(255,255,255,0.7);text-align:center;margin-top:4px;letter-spacing:0.04em;}
.cal-hero-today-btn{position:absolute;top:calc(var(--safe-top) + 10px);right:16px;background:rgba(255,255,255,0.15);border:none;border-radius:999px;padding:4px 12px;font-size:0.65rem;color:#fff;cursor:pointer;font-family:inherit;}
.cal-hero-menu-btn{position:absolute;top:calc(var(--safe-top) + 8px);left:16px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;color:#fff;}

.cal-body{background:#fff;border-radius:24px 24px 0 0;margin-top:-12px;padding:16px 12px 20px;}

.trip-range-bar{background:#f7f7f7;border-radius:12px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.trip-range-label{font-size:0.6rem;color:var(--sub);}
.trip-range-val{font-size:0.72rem;font-weight:500;color:var(--ink);}
.trip-set-btn{font-size:0.65rem;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;}

.weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.weekday{text-align:center;font-size:0.6rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#c0c0c0;padding:4px 0 8px;}
.weekday:first-child{color:var(--red);}
.weekday:last-child{color:var(--blue);}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.day-cell{border-radius:8px;padding:5px 3px;min-height:60px;cursor:pointer;overflow:hidden;transition:background 0.1s;position:relative;}
.day-cell:active{background:#f0f0f0;}
.day-cell.empty{pointer-events:none;}
.day-cell.in-trip{background:rgba(90,158,111,0.07);}
.day-cell.trip-start{background:rgba(90,158,111,0.14);border-top-left-radius:12px;border-bottom-left-radius:12px;}
.day-cell.trip-end{background:rgba(90,158,111,0.14);border-top-right-radius:12px;border-bottom-right-radius:12px;}
.day-num-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.day-num{font-size:0.8rem;font-weight:400;color:#222;line-height:1;}
.day-total{font-size:0.46rem;color:#c0c0c0;font-family:'Inter',sans-serif;}
.day-cell.sunday .day-num{color:var(--red);}
.day-cell.saturday .day-num{color:var(--blue);}
.day-cell.holiday .day-num{color:var(--red);}
.day-cell.today .day-num{background:var(--ink);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:600;}
.holiday-label{display:block;font-size:0.44rem;color:var(--red);opacity:0.7;margin-bottom:2px;line-height:1.2;font-family:'Noto Sans JP',sans-serif;}
.event-chip{display:block;margin-top:2px;padding:1px 5px;border-radius:999px;background:#f0f0f0;color:#444;font-size:0.5rem;font-family:'Noto Sans JP','Inter',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.6;}

/* ── TIMELINE ── */
.tl-header{font-size:1.4rem;font-weight:700;letter-spacing:-0.04em;color:var(--ink);margin-bottom:4px;padding-top:4px;}
.tl-subheader{font-size:0.72rem;color:var(--sub);margin-bottom:1rem;}

function getStation(addr,name){
  const str=(addr||'')+(name||'');
  for(const s of STATIONS) if(s.keys.some(k=>str.includes(k))) return s;
  return null;
}

function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function parseJpy(str){
  if(!str) return NaN;
  const n=str.replace(/,/g,'').match(/\d+/g);
  return n?Math.max(...n.map(Number)):NaN;
}
function jpyToKrw(jpy){ return Math.round(jpy*state.rate/100); }
function fmtKrw(w){ return '₩'+w.toLocaleString(); }
function fmtJpy(y){ return '¥'+y.toLocaleString(); }

function calcEvTotal(ev){
  return (ev.menu||[]).reduce((s,m)=>{const n=parseJpy(m.price);return s+(isNaN(n)?0:n);},0);
}
function calcDayTotal(evList){
  return (evList||[]).reduce((s,ev)=>s+calcEvTotal(ev),0);
}

function isInTrip(y,m,d){
  if(!state.trip.start||!state.trip.end) return false;
  const k=dateKey(y,m,d);
  return k>=state.trip.start&&k<=state.trip.end;
}
function isTripStart(y,m,d){ return dateKey(y,m,d)===state.trip.start; }
function isTripEnd(y,m,d){ return dateKey(y,m,d)===state.trip.end; }

// ═══ CALENDAR BUILD ═══
function buildCal(){
  const y=state.viewYear, m=state.viewMonth;
  const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent=MONTH_NAMES[m];
  document.getElementById('calYearLabel').textContent=y;

  // Apply monthly color
  const hero=document.querySelector('.cal-hero');
  hero.className='cal-hero m'+(m+1);

  // trip range display
  const tr=state.trip;
  if(tr.start&&tr.end){
    const s=new Date(tr.start), e=new Date(tr.end);
    const fmt=d=>`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    document.getElementById('tripRangeDisplay').textContent=`${fmt(s)} ~ ${fmt(e)}`;
  } else {
    document.getElementById('tripRangeDisplay').textContent='설정되지 않음';
  }

  const grid=document.getElementById('daysGrid');
  grid.innerHTML='';
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();
  const todayKey=dateKey(today.getFullYear(),today.getMonth(),today.getDate());

  for(let i=0;i<firstDay;i++){ const e=document.createElement('div'); e.className='day-cell empty'; grid.appendChild(e); }

  for(let d=1;d<=daysInMonth;d++){
    const dow=(firstDay+d-1)%7;
    const key=dateKey(y,m,d);
    const cell=document.createElement('div');
    let cls='day-cell';
    if(dow===0) cls+=' sunday';
    if(dow===6) cls+=' saturday';
    const hol=getHoliday(y,m,d);
    if(hol) cls+=' holiday';
    if(key===todayKey) cls+=' today';
    if(isTripStart(y,m,d)) cls+=' trip-start';
    else if(isTripEnd(y,m,d)) cls+=' trip-end';
    else if(isInTrip(y,m,d)) cls+=' in-trip';
    cell.className=cls;
    cell.onclick=()=>openSheet(y,m,d,dow);

    const nr=document.createElement('div'); nr.className='day-num-row';
    const nm=document.createElement('span'); nm.className='day-num'; nm.textContent=d; nr.appendChild(nm);
    const evList=state.events[key]||[];
    const tot=calcDayTotal(evList);
    if(tot>0){ const te=document.createElement('span'); te.className='day-total'; te.textContent=fmtJpy(tot); nr.appendChild(te); }
    cell.appendChild(nr);

    if(hol){ const hl=document.createElement('span'); hl.className='holiday-label'; hl.textContent=hol; cell.appendChild(hl); }
    evList.forEach(ev=>{ const ch=document.createElement('span'); ch.className='event-chip'; ch.textContent=ev.name; cell.appendChild(ch); });
    grid.appendChild(cell);
  }
  const rem=(firstDay+daysInMonth)%7;
  if(rem>0) for(let i=rem;i<7;i++){ const e=document.createElement('div'); e.className='day-cell empty'; grid.appendChild(e); }
}

function prevMonth(){ state.viewMonth--; if(state.viewMonth<0){state.viewMonth=11;state.viewYear--;} buildCal(); }
function nextMonth(){ state.viewMonth++; if(state.viewMonth>11){state.viewMonth=0;state.viewYear++;} buildCal(); }
function goToday(){ const t=new Date(); state.viewYear=t.getFullYear(); state.viewMonth=t.getMonth(); buildCal(); }

// ═══ TIMELINE ═══
function buildTimeline(){
  const tr=state.trip;
  document.getElementById('tlHeader').textContent='🗾 '+(state.trip.name||'여행 일정');
  if(tr.start&&tr.end){
    const s=new Date(tr.start), e=new Date(tr.end);
    const days=Math.round((e-s)/(1000*60*60*24))+1;
    document.getElementById('tlSubheader').textContent=`${tr.start} ~ ${tr.end} · ${days}일`;
  } else { document.getElementById('tlSubheader').textContent=''; }

  // collect all event keys
  const allKeys=Object.keys(state.events).sort();
  const c=document.getElementById('timelineContent');

  if(!allKeys.length){ c.innerHTML='<div class="tl-empty">일정을 추가하면 여기에 표시됩니다</div>'; document.getElementById('tlTripTotal').innerHTML=''; return; }

  // trip total
  let grandTotal=0;
  allKeys.forEach(k=>{ grandTotal+=calcDayTotal(state.events[k]||[]); });
  const grandKrw=jpyToKrw(grandTotal);
  document.getElementById('tlTripTotal').innerHTML=grandTotal>0?`
    <div class="tl-trip-total">
      <div><div class="tl-trip-total-label">여행 총 예상 비용</div></div>
      <div style="text-align:right">
        <div class="tl-trip-total-val">${fmtJpy(grandTotal)}</div>
        <div class="tl-trip-total-krw">${fmtKrw(grandKrw)}</div>
      </div>
    </div>`:'';

  c.innerHTML=allKeys.map(key=>{
    const [ky,km,kd]=key.split('-').map(Number);
    const dow=new Date(key).getDay();
    const evList=state.events[key]||[];
    const dayTot=calcDayTotal(evList);
    const dc=dow===0?'color:var(--red)':dow===6?'color:var(--blue)':'';
    const hol=getHoliday(ky,km-1,kd);

    const cards=evList.map((ev,idx)=>{
      const st=getStation(ev.addr,ev.name);
      const stHtml=st?`<div class="tl-station"><span class="station-dot ${st.cls}"></span>${st.name} · ${st.line} · ${st.walk}</div>`:'';
      const addrHtml=ev.addr?`<div class="tl-addr"><span>📍</span><span>${ev.addr}</span></div>`:'';
      const imgHtml=ev.photo?`<img class="tl-card-img" src="${ev.photo}" alt="">`:'';
      const evTot=calcEvTotal(ev);
      const menuHtml=(ev.menu&&ev.menu.length)?`<div class="tl-menu-list">${ev.menu.map(m=>{
        const jp=parseJpy(m.price); const kr=!isNaN(jp)?jpyToKrw(jp):null;
        return `<div class="tl-menu-item"><span>${m.name}</span><div class="tl-menu-price-col"><div class="tl-menu-jpy">${m.price}</div>${kr?`<div class="tl-menu-krw">${fmtKrw(kr)}</div>`:''}</div></div>`;
      }).join('')}</div>`:'';
      const totHtml=evTot>0?`<div class="tl-total"><span class="tl-total-label">합계</span><div class="tl-total-right"><div class="tl-total-jpy">${fmtJpy(evTot)}</div><div class="tl-total-krw">${fmtKrw(jpyToKrw(evTot))}</div></div></div>`:'';
      return `<div class="tl-card">
        ${imgHtml}
        <div class="tl-card-row">
          <div><div class="tl-card-name">${ev.name}</div><div class="tl-card-sub">${ev.sub||''}</div></div>
          <div class="tl-actions">
            <button class="s-btn" onclick="tlEdit('${key}',${idx})">수정</button>
            <button class="s-btn del" onclick="tlDel('${key}',${idx})">삭제</button>
          </div>
        </div>
        ${addrHtml}${stHtml}${menuHtml}${totHtml}
      </div>`;
    }).join('');

    return `<div class="tl-day">
      <div class="tl-date-row">
        <div class="tl-date-num" style="${dc}">${kd}</div>
        <div class="tl-date-info">
          <div class="tl-date-sub">${ky}년 ${km}월 ${kd}일 ${DOW[dow]}요일${hol?' · 🎌'+hol:''}</div>
          ${dayTot>0?`<div class="tl-date-total">${fmtJpy(dayTot)} <span class="tl-date-krw">· ${fmtKrw(jpyToKrw(dayTot))}</span></div>`:''}
        </div>
      </div>${cards}
    </div>`;
  }).join('');
}

function onRateChange(){
  const rate=Number(document.getElementById('rateInput').value)||state.rate;
  // update all krw previews
  document.querySelectorAll('.form-menu-row').forEach(row=>{
    const inp=row.querySelector('.price');
    const prev=row.querySelector('.krw-preview');
    if(!inp||!prev) return;
    const jp=parseJpy(inp.value);
    prev.textContent=!isNaN(jp)?`${fmtKrw(Math.round(jp*rate/100))}`:'';
  });
}

function addMenuRow(name='',price=''){
  const list=document.getElementById('formMenuList');
  const row=document.createElement('div');
  row.className='form-menu-row';
  row.style.flexWrap='wrap';
  const rate=Number(document.getElementById('rateInput').value)||state.rate;
  const jp=parseJpy(price);
  const krwText=(!isNaN(jp)&&jp>0)?fmtKrw(Math.round(jp*rate/100)):'';
  row.innerHTML=`
    <input class="form-input" placeholder="메뉴명" value="${name}" style="margin-bottom:4px">
    <input class="form-input price" placeholder="¥0" value="${price}" style="margin-bottom:4px" oninput="updateKrwPreview(this)">
    <button class="form-menu-del" onclick="this.parentElement.remove()">×</button>
    <div class="krw-preview" style="width:100%;padding-left:2px">${krwText}</div>`;
  list.appendChild(row);
}

function updateKrwPreview(input){
  const row=input.closest('.form-menu-row');
  const prev=row.querySelector('.krw-preview');
  if(!prev) return;
  const rate=Number(document.getElementById('rateInput').value)||state.rate;
  const jp=parseJpy(input.value);
  prev.textContent=!isNaN(jp)&&jp>0?fmtKrw(Math.round(jp*rate/100)):'';
}

function saveEvent(){
  const name=document.getElementById('inputName').value.trim();
  const sub=document.getElementById('inputSub').value.trim();
  const addr=document.getElementById('inputAddr').value.trim();
  const rate=Number(document.getElementById('rateInput').value);
  if(!name){document.getElementById('inputName').focus();return;}
  if(rate>0) state.rate=rate;
  const menu=[];
  document.querySelectorAll('#formMenuList .form-menu-row').forEach(row=>{
    const ins=row.querySelectorAll('input');
    const n=ins[0].value.trim(), p=ins[1].value.trim();
    if(n) menu.push({name:n,price:p});
  });
  const ev={type:'custom',name,sub,addr,...(menu.length?{menu}:{}),...(tempPhoto?{photo:tempPhoto}:{})};
  if(!state.events[curKey]) state.events[curKey]=[];
  if(editIdx!==null) state.events[curKey][editIdx]=ev;
  else state.events[curKey].push(ev);
  persist(); buildCal(); if(curKey) renderDayPanel(); closeFormSheet();
}

function delEv(idx){
  state.events[curKey].splice(idx,1);
  if(!state.events[curKey].length) delete state.events[curKey];
  persist(); buildCal(); if(curKey) renderDayPanel();
}

function tlEdit(key,idx){
  curKey=key; curDow=new Date(key).getDay();
  document.getElementById('sheetOverlay').classList.add('active');
  openFormSheet(idx);
}
function tlDel(key,idx){
  state.events[key].splice(idx,1);
  if(!state.events[key].length) delete state.events[key];
  persist(); buildCal(); buildTimeline();
}

// ═══ SETTINGS ═══
function openSettings(){
  const s=state.trip.start?state.trip.start.split('-'):['2026','10','07'];
  const e=state.trip.end?state.trip.end.split('-'):['2026','10','31'];
  document.getElementById('startYear').value=s[0];
  document.getElementById('startMonth').value=Number(s[1]);
  document.getElementById('startDay').value=Number(s[2]);
  document.getElementById('endYear').value=e[0];
  document.getElementById('endMonth').value=Number(e[1]);
  document.getElementById('endDay').value=Number(e[2]);
  document.getElementById('tripName').value=state.trip.name||'';
  document.getElementById('defaultRate').value=state.rate||930;
  document.getElementById('sheetOverlay').classList.add('active');
  document.getElementById('settingsSheet').classList.add('active');
}
function closeSettings(){
  document.getElementById('settingsSheet').classList.remove('active');
  document.getElementById('sheetOverlay').classList.remove('active');
}
function saveSettings(){
  const sy=document.getElementById('startYear').value;
  const sm=document.getElementById('startMonth').value;
  const sd=document.getElementById('startDay').value;
  const ey=document.getElementById('endYear').value;
  const em=document.getElementById('endMonth').value;
  const ed=document.getElementById('endDay').value;
  const name=document.getElementById('tripName').value.trim();
  const rate=Number(document.getElementById('defaultRate').value);

  if(sy&&sm&&sd){
    state.trip.start=`${sy}-${String(sm).padStart(2,'0')}-${String(sd).padStart(2,'0')}`;
  }
  if(ey&&em&&ed){
    state.trip.end=`${ey}-${String(em).padStart(2,'0')}-${String(ed).padStart(2,'0')}`;
  }
  if(name) state.trip.name=name;
  if(rate>0) state.rate=rate;
  if(sy) { state.viewYear=Number(sy); state.viewMonth=Number(sm)-1; }
  persist(); buildCal();
  document.getElementById('sidebarTripName').textContent=state.trip.name||'여행 캘린더';
  closeSettings();
}

// ═══ INIT ═══
buildCal();
</script>
<script>
// Service Worker 등록 (오프라인 지원)
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='travelcal-v1';
    const ASSETS=['/'];
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));
    });
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// iOS 홈 화면 추가 안내 (처음 실행 시)
window.addEventListener('load',()=>{
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone;
  const shown=localStorage.getItem('pwa_hint_shown');
  if(isIOS && !isStandalone && !shown){
    setTimeout(()=>{
      const banner=document.createElement('div');
      banner.style.cssText='position:fixed;bottom:calc(env(safe-area-inset-bottom)+70px);left:12px;right:12px;background:#111;color:#fff;border-radius:16px;padding:14px 16px;z-index:999;font-size:0.8rem;line-height:1.5;box-shadow:0 4px 24px rgba(0,0,0,0.3);';
      banner.innerHTML=`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
          <div>
            <div style="font-weight:600;margin-bottom:4px">📲 홈 화면에 추가하기</div>
            <div style="color:#aaa;font-size:0.72rem">Safari 하단 <b style="color:#fff">공유 버튼 →</b> <b style="color:#fff">홈 화면에 추가</b>를 탭하면 앱처럼 사용할 수 있어요</div>
          </div>
          <button onclick="this.parentElement.parentElement.remove();localStorage.setItem('pwa_hint_shown','1')" style="background:none;border:none;color:#aaa;font-size:1.2rem;cursor:pointer;flex-shrink:0;padding:0;line-height:1">×</button>
        </div>`;
      document.body.appendChild(banner);
      localStorage.setItem('pwa_hint_shown','1');
    }, 1500);
  }
});
</script>
